version: "3.9"

services:
  web:
    build: .
    container_name: apartments-portoroz
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.apartments.rule=Host(`demo.portorose.si`)
      - traefik.http.routers.apartments.entrypoints=websecure
      - traefik.http.routers.apartments.tls.certresolver=letsencrypt
      - traefik.http.services.apartments.loadbalancer.server.port=80

networks:
  proxy:
    external: true
